<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="description" content="ページが見つかりませんでした。" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>404 | Phonography</title>
    <style>
      #app {
        min-height: calc(100svh - 4rem);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        max-width: 24rem;
      }

      .logo-wrap {
        margin-bottom: 1.5rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        letter-spacing: 0.06em;
        color: #5f5f5f;
      }

      p {
        margin: 0;
        font-size: 0.875rem;
        color: #9a9a9a;
      }

      a {
        color: #6a6a6a;
        text-decoration: none;
      }

      a:hover {
        color: #3f3f3f;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main>
        <a href="/" aria-label="Phonography トップページへ">
          <div class="logo-wrap">
            <img class="logo-mark" src="/logo.png" alt="" aria-hidden="true" />
            <img class="logo-type" src="/logo-type.svg" alt="phonography" />
          </div>
        </a>
        <h1>404 Not Found</h1>
      </main>
    </div>
  </body>
</html>
